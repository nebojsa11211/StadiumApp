<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Stadium Drink Ordering</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f2937;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .offline-message {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .offline-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .cached-content {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
        }

        .cached-content h2 {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 15px;
        }

        .cached-list {
            list-style: none;
        }

        .cached-list li {
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
            text-align: left;
        }

        .cached-list a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .cached-list a:hover {
            text-decoration: underline;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .footer-text {
            margin-top: 30px;
            font-size: 14px;
            color: #9ca3af;
        }

        @media (max-width: 640px) {
            .offline-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .offline-icon {
                width: 100px;
                height: 100px;
            }

            .offline-icon svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>

        <h1>
            <span class="status-indicator"></span>
            You're Offline
        </h1>

        <p class="offline-message">
            No internet connection detected. Some features may be limited, but you can still access cached content while offline.
        </p>

        <div class="offline-actions">
            <button class="btn btn-primary" onclick="checkConnection()">
                Check Connection
            </button>
            <button class="btn btn-secondary" onclick="goHome()">
                Go to Home
            </button>
        </div>

        <div class="cached-content">
            <h2>Available Cached Pages</h2>
            <ul class="cached-list">
                <li><a href="/">Home</a></li>
                <li><a href="/events">Events</a></li>
                <li><a href="/menu">Drink Menu</a></li>
                <li><a href="/orders">My Orders</a></li>
            </ul>
        </div>

        <p class="footer-text">
            You'll be automatically reconnected when your internet connection is restored.
        </p>
    </div>

    <script>
        // Check connection and reload if online
        function checkConnection() {
            if (navigator.onLine) {
                location.reload();
            } else {
                alert('Still offline. Please check your internet connection.');
            }
        }

        // Navigate to home page
        function goHome() {
            window.location.href = '/';
        }

        // Auto-reload when connection is restored
        window.addEventListener('online', () => {
            console.log('Connection restored, reloading...');
            setTimeout(() => {
                location.reload();
            }, 1000);
        });

        // Update UI when offline/online status changes
        window.addEventListener('offline', () => {
            console.log('Connection lost');
        });

        // Check if we're actually online now
        if (navigator.onLine) {
            console.log('Online now, attempting reload...');
            location.reload();
        }
    </script>
</body>
</html>
