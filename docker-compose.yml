services:
  # Local PostgreSQL database (for offline development / when Supabase is unreachable)
  postgres:
    image: postgres:16-alpine
    container_name: stadium-postgres-local
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stadiumdb
    ports:
      - "5432:5432"
    volumes:
      - stadium-pg-data:/var/lib/postgresql/data
    networks:
      - stadium-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stadiumdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: .
      dockerfile: StadiumDrinkOrdering.API/Dockerfile
    container_name: stadium-api
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=stadiumdb;Username=postgres;Password=postgres;Pooling=true;Command Timeout=60
      - UseSqliteFallback=false
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER:-StadiumDrinkOrdering}
      - JwtSettings__Audience=${JWT_AUDIENCE:-StadiumDrinkOrdering}
      - ASPNETCORE_URLS=https://+:8443
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8443
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${SSL_CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetcore-multi-hostname.pfx
      - DOTNET_RUNNING_IN_CONTAINER=true
      - Logging__LogLevel__Default=${LOG_LEVEL_DEFAULT:-Information}
      - Logging__LogLevel__Microsoft.AspNetCore=${LOG_LEVEL_ASPNETCORE:-Information}
    ports:
      - "9010:8443"
      - "9011:8080"
    volumes:
      - ./certificates:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stadium-network
    restart: unless-stopped

  # Admin Frontend
  admin:
    build:
      context: .
      dockerfile: StadiumDrinkOrdering.Admin/Dockerfile
    container_name: stadium-admin
    environment:
      - TZ=${TZ:-Europe/Zagreb}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ApiSettings__BaseUrl=${API_BASE_URL:-https://api:8443/}
      - ASPNETCORE_URLS=https://+:8445
      - ASPNETCORE_HTTP_PORTS=8082
      - ASPNETCORE_HTTPS_PORTS=8445
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${SSL_CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetcore-multi-hostname.pfx
      - DOTNET_RUNNING_IN_CONTAINER=true
      - Logging__LogLevel__Default=${LOG_LEVEL_DEFAULT:-Information}
      - Logging__LogLevel__Microsoft.AspNetCore=${LOG_LEVEL_ASPNETCORE:-Information}
    ports:
      - "9030:8445"
      - "9031:8082"
    volumes:
      - ./certificates:/https:ro
    depends_on:
      - api
    networks:
      - stadium-network
    restart: unless-stopped

# Networks
networks:
  stadium-network:
    driver: bridge
    name: stadium-network

# Volumes
volumes:
  # Reuses the volume created by the original standalone container so existing
  # (migrated + seeded) data carries over to the compose-managed postgres service.
  stadium-pg-data:
    external: true
